<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cocktail Menu Trainer</title>
    <style>
        :root {
            --bg: #1a1a24;
            --surface: #242433;
            --surface2: #2e2e40;
            --gold: #d4a96a;
            --gold-light: #e8c97a;
            --text: #e0dcd0;
            --text-dim: #a09b90;
            --accent-green: #5cb88d;
            --accent-red: #d4756b;
            --accent-purple: #b08fd4;
            --border: #3a3a4a;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }
        .app-header .title-group h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .settings-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            font-family: var(--font);
        }
        .settings-btn:active {
            border-color: var(--gold);
            color: var(--gold-light);
            background: var(--surface2);
        }

        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        .cat-pill {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            font-family: var(--font);
            transition: all var(--transition);
        }
        .cat-pill:active {
            border-color: var(--gold);
            color: var(--text);
        }
        .cat-pill.active {
            background: var(--gold);
            color: #1a1a24;
            border-color: var(--gold);
            font-weight: 600;
        }
        .cat-pill.focus-pill {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }
        .cat-pill.focus-pill.active {
            background: var(--accent-purple);
            color: #fff;
            border-color: var(--accent-purple);
            font-weight: 600;
        }

        .diff-bar {
            display: flex;
            gap: 3px;
            background: var(--surface);
            border-radius: 24px;
            padding: 3px;
            width: fit-content;
            margin: 0 auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        .diff-tab {
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            font-family: var(--font);
        }
        .diff-tab:active {
            color: var(--text);
        }
        .diff-tab.active {
            background: var(--surface2);
            color: var(--gold-light);
            font-weight: 600;
        }

        .quiz-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 260px;
            border: 1px solid var(--border);
        }
        .quiz-card .drink-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold-light);
            text-align: center;
        }
        .quiz-card .ingredient-count {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: -8px;
        }
        .quiz-card .hint-text {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-dim);
            font-style: italic;
        }

        .ingredient-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-height: 250px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px;
        }
        .ingredient-grid.all-ingredients {
            max-height: 350px;
        }
        .ing-chit {
            padding: 8px 12px;
            border-radius: 18px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: var(--font);
        }
        .ing-chit:active {
            border-color: var(--gold);
            background: #35354a;
        }
        .ing-chit.selected {
            background: var(--gold);
            color: #1a1a24;
            border-color: var(--gold);
            font-weight: 600;
        }
        .ing-chit.correct-reveal {
            background: var(--accent-green) !important;
            color: #fff !important;
            border-color: var(--accent-green) !important;
        }
        .ing-chit.incorrect-reveal {
            background: var(--accent-red) !important;
            color: #fff !important;
            border-color: var(--accent-red) !important;
        }
        .ing-chit.missed-reveal {
            border-color: var(--accent-green) !important;
            border-style: dashed !important;
        }

        .role-slots {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .role-slot label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .role-slot input {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            width: 100%;
            -webkit-appearance: none;
        }
        .role-slot input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .role-slot input.correct {
            border-color: var(--accent-green) !important;
            background: #2a3a30;
        }
        .role-slot input.partial {
            border-color: #d4a040 !important;
            background: #3a3528;
        }
        .role-slot input.incorrect {
            border-color: var(--accent-red) !important;
            background: #3a2828;
        }
        .role-feedback {
            font-size: 0.7rem;
            min-height: 16px;
            padding-left: 4px;
        }
        .role-feedback .missed { color: var(--accent-red); }
        .role-feedback .extra { color: #d4a040; }

        .blank-input {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            resize: vertical;
            -webkit-appearance: none;
        }
        .blank-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 22px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: var(--font);
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--gold);
            color: #1a1a24;
        }
        .btn-primary:active {
            background: var(--gold-light);
            transform: scale(0.97);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-secondary:active {
            border-color: var(--gold);
            color: var(--gold-light);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: 16px;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .result-banner {
            text-align: center;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .result-banner.perfect {
            background: #2a3a30;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        .result-banner.good {
            background: #3a3528;
            color: #d4a040;
            border: 1px solid #d4a040;
        }
        .result-banner.poor {
            background: #3a2828;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .progress-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px 16px;
            border: 1px solid var(--border);
        }
        .progress-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-align: center;
        }
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .progress-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            font-size: 0.7rem;
        }
        .progress-item .p-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .progress-bar-mini {
            width: 35px;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .progress-bar-mini .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .fill.high { background: var(--accent-green); }
        .fill.mid { background: #d4a040; }
        .fill.low { background: var(--accent-red); }
        .progress-item .pct {
            font-size: 0.65rem;
            color: var(--text-dim);
            width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .cheat-toggle {
            text-align: center;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 8px;
        }
        .cheat-toggle:active { color: var(--gold-light); }
        .cheat-sheet {
            display: none;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
            max-height: 400px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .cheat-sheet.open { display: block; }
        .cheat-sheet h3 {
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
        }
        .cheat-drink {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .cheat-drink:last-child { border-bottom: none; }
        .cheat-drink .cd-name {
            font-weight: 700;
            color: var(--gold-light);
            font-size: 0.85rem;
        }
        .cheat-drink .cd-ingredients {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            max-width: 700px;
            width: 100%;
            margin: 16px auto;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .settings-drink {
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .settings-drink h4 {
            color: var(--gold-light);
            margin-bottom: 6px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .settings-ingredient {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        .settings-ingredient label {
            flex: 1;
            color: var(--text);
            font-size: 0.78rem;
        }
        .settings-ingredient input {
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.8rem;
            font-family: var(--font);
            width: 100px;
            -webkit-appearance: none;
        }
        .settings-ingredient input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .focus-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-purple);
            cursor: pointer;
        }
        .save-settings-btn {
            display: block;
            margin: 14px auto 0;
            background: var(--gold);
            color: #1a1a24;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .save-settings-btn:active {
            background: var(--gold-light);
            transform: scale(0.97);
        }

        @media (max-width: 400px) {
            .app-container { padding: 8px; gap: 8px; }
            .quiz-card { padding: 14px 10px; gap: 10px; }
            .quiz-card .drink-name { font-size: 1.15rem; }
            .ing-chit { padding: 6px 10px; font-size: 0.75rem; }
            .diff-tab { padding: 6px 10px; font-size: 0.72rem; }
            .btn { padding: 8px 14px; font-size: 0.8rem; }
            .cat-pill { padding: 6px 10px; font-size: 0.75rem; }
            .progress-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="title-group">
                <h1>🍸 Menu Trainer</h1>
                <div class="subtitle">Learn every cocktail by heart</div>
            </div>
            <button class="settings-btn" id="openSettingsBtn">⚙️ Settings</button>
        </div>

        <div class="category-bar" id="categoryBar">
            <button class="cat-pill active" data-cat="all">All (27)</button>
            <button class="cat-pill focus-pill" data-cat="focus">🎯 Focus</button>
            <button class="cat-pill" data-cat="Creamy & Dessert">Creamy (5)</button>
            <button class="cat-pill" data-cat="Egg White Sours">Egg White (7)</button>
            <button class="cat-pill" data-cat="Fruity & Refreshing">Fruity (14)</button>
            <button class="cat-pill" data-cat="Stirred & Spirit-Forward">Stirred (1)</button>
        </div>

        <div class="diff-bar" id="diffBar">
            <button class="diff-tab active" data-level="1">L1: Pick Set</button>
            <button class="diff-tab" data-level="2">L2: All Picks</button>
            <button class="diff-tab" data-level="3">L3: Roles</button>
            <button class="diff-tab" data-level="4">L4: Build</button>
            <button class="diff-tab" data-level="5">L5: Recipe</button>
        </div>

        <div class="quiz-card" id="quizCard">
            <div class="drink-name" id="drinkName">--</div>
            <div class="ingredient-count" id="ingCount"></div>
            <div class="hint-text" id="hintText"></div>
            <div id="quizContent"></div>
            <div id="resultBanner"></div>
            <div class="btn-row" id="btnRow">
                <button class="btn btn-primary" id="btnSubmit">Check</button>
                <button class="btn btn-secondary" id="btnSkip">Reveal</button>
                <button class="btn btn-secondary" id="btnNext" style="display:none;">Next →</button>
            </div>
        </div>

        <div class="progress-section" id="progressSection">
            <h3>📊 Progress (L<span id="progressLevelLabel">1</span>)</h3>
            <div class="progress-grid" id="progressGrid"></div>
            <div style="text-align:center;margin-top:8px;">
                <button class="btn btn-sm btn-secondary" id="btnResetProgress">Reset Progress</button>
            </div>
        </div>

        <div class="cheat-toggle" id="cheatToggle">📋 Show Full Menu ▾</div>
        <div class="cheat-sheet" id="cheatSheet"></div>

        <div class="modal-overlay" id="settingsModal">
            <div class="modal-content" id="settingsContent"></div>
        </div>
    </div>

            // Load measurements
            function loadMeasurements() {
                try { return JSON.parse(localStorage.getItem('cocktailMeasurements')) || {}; } catch(e) { return {}; }
            }
            function saveMeasurements(map) {
                try { localStorage.setItem('cocktailMeasurements', JSON.stringify(map)); } catch(e) {}
            }

            // Load focus set
            function loadFocusSet() {
                try {
                    const arr = JSON.parse(localStorage.getItem('cocktailFocus')) || [];
                    return new Set(arr);
                } catch(e) { return new Set(); }
            }
            function saveFocusSet(set) {
                try { localStorage.setItem('cocktailFocus', JSON.stringify([...set])); } catch(e) {}
            }
            let focusSet = loadFocusSet();

            function buildCocktails() {
                const measMap = loadMeasurements();
                return baseCocktails.map(c => ({
                    ...c,
                    ingredients: c.ingredients.map(ing => ({
                        ...ing,
                        measurement: measMap[c.name + '||' + ing.full] || ing.measurement || ''
                    })),
                    focus: focusSet.has(c.name)
                }));
            }

            let cocktails = buildCocktails();

            // ─────────────────────────────────────
            // APP STATE
            // ─────────────────────────────────────
            const PROGRESS_KEY = 'cocktailTrainerProgressV2'; // new key to avoid conflicts
            let currentCategory = 'all';
            let currentLevel = 1;
            let currentDrinkIndex = -1;
            let isRevealed = false;
            let filteredDrinks = [...cocktails];

            function loadProgress() {
                try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; } catch(e) { return {}; }
            }
            function saveProgress(p) {
                try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch(e) {}
            }
            let progressData = loadProgress();

            function getProgress(drinkName, level) {
                const key = drinkName + '||' + level;
                return progressData[key] || { correct: 0, attempts: 0 };
            }
            function recordAttempt(drinkName, level, correct) {
                const key = drinkName + '||' + level;
                const cur = progressData[key] || { correct: 0, attempts: 0 };
                cur.attempts++;
                if (correct) cur.correct++;
                progressData[key] = cur;
                saveProgress(progressData);
            }
            function getPct(drinkName, level) {
                const p = getProgress(drinkName, level);
                if (p.attempts === 0) return null;
                return Math.round((p.correct / p.attempts) * 100);
            }

            function updateFilteredDrinks() {
                if (currentCategory === 'focus') {
                    filteredDrinks = cocktails.filter(c => c.focus);
                } else if (currentCategory === 'all') {
                    filteredDrinks = [...cocktails];
                } else {
                    filteredDrinks = cocktails.filter(c => c.category === currentCategory);
                }
            }

            function norm(s) { return (s||'').toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim(); }
            function ingMatch(user, keys) {
                const u = norm(user);
                if (u.length < 2) return false;
                for (const k of keys) {
                    const nk = norm(k);
                    if (u === nk || u.includes(nk) || nk.includes(u)) return true;
                }
                return false;
            }
            function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
            function escapeHTML(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

            // DOM
            const $ = id => document.getElementById(id);
            const catBar = $('categoryBar');
            const diffBar = $('diffBar');
            const drinkName = $('drinkName');
            const ingCount = $('ingCount');
            const hintText = $('hintText');
            const quizContent = $('quizContent');
            const resultBanner = $('resultBanner');
            const btnSubmit = $('btnSubmit');
            const btnSkip = $('btnSkip');
            const btnNext = $('btnNext');
            const progressGrid = $('progressGrid');
            const progressLevelLabel = $('progressLevelLabel');
            const cheatSheet = $('cheatSheet');
            const cheatToggle = $('cheatToggle');
            const settingsModal = $('settingsModal');
            const settingsContent = $('settingsContent');

            function pickDrink() {
                if (filteredDrinks.length === 0) updateFilteredDrinks();
                if (filteredDrinks.length === 0) {
                    // fallback if focus empty
                    alert('No cocktails in this category. Please add some to Focus in Settings.');
                    currentCategory = 'all';
                    document.querySelector('.cat-pill[data-cat="all"]').classList.add('active');
                    updateFilteredDrinks();
                }
                const idx = Math.floor(Math.random() * filteredDrinks.length);
                currentDrinkIndex = idx;
                isRevealed = false;
                return filteredDrinks[idx];
            }

            function resetQuiz() {
                currentDrinkIndex = -1;
                isRevealed = false;
                resultBanner.innerHTML = '';
                btnSubmit.style.display = '';
                btnSkip.style.display = '';
                btnNext.style.display = 'none';
                btnSubmit.disabled = false;
                btnSkip.disabled = false;
                loadDrink();
            }

            function loadDrink() {
                const drink = pickDrink();
                drinkName.textContent = drink.name;
                ingCount.textContent = drink.ingredients.length + ' ingredients';
                resultBanner.innerHTML = '';
                btnSubmit.style.display = '';
                btnSkip.style.display = '';
                btnNext.style.display = 'none';
                btnSubmit.disabled = false;
                btnSkip.disabled = false;
                isRevealed = false;
                renderLevel(drink);
            }

            function renderLevel(drink) {
                hintText.textContent = '';
                if (currentLevel === 1) renderL1(drink);
                else if (currentLevel === 2) renderL2(drink);
                else if (currentLevel === 3) renderL3(drink);
                else if (currentLevel === 4) renderL4(drink);
                else if (currentLevel === 5) renderL5(drink);
            }

            // ── LEVEL 1 (Pick Set) ──
            function renderL1(drink) {
                hintText.textContent = 'Tap all correct ingredients.';
                const correctSet = new Set(drink.ingredients.map(i=>i.full));
                const allIngs = [...new Set(cocktails.flatMap(c=>c.ingredients.map(i=>i.full)))];
                const decoys = shuffle(allIngs.filter(i=>!correctSet.has(i))).slice(0, Math.min(6, allIngs.length - correctSet.size));
                const options = shuffle([...drink.ingredients.map(i=>i.full), ...decoys]);
                let html = '<div class="ingredient-grid">';
                options.forEach(opt => {
                    html += `<span class="ing-chit" data-ing="${escapeHTML(opt)}" data-correct="${correctSet.has(opt)}">${escapeHTML(opt)}</span>`;
                });
                html += '</div>';
                quizContent.innerHTML = html;
                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    ch.addEventListener('click', () => {
                        if (isRevealed) return;
                        ch.classList.toggle('selected');
                    });
                });
            }

            function checkL1(drink) {
                const correctSet = new Set(drink.ingredients.map(i=>i.full));
                let allOk = true;
                const selectedOk = new Set();
                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    const isOk = ch.dataset.correct === 'true';
                    const sel = ch.classList.contains('selected');
                    if (sel && isOk) { ch.classList.add('correct-reveal'); selectedOk.add(ch.dataset.ing); }
                    else if (sel && !isOk) { ch.classList.add('incorrect-reveal'); allOk = false; }
                    else if (!sel && isOk) { ch.classList.add('missed-reveal'); allOk = false; }
                });
                if (selectedOk.size !== correctSet.size) allOk = false;
                finishQuiz(drink, allOk, allOk ? '✅ Perfect!' : (selectedOk.size >= correctSet.size*0.6 ? '👍 Close!' : '❌ Keep studying.'));
            }

            function skipL1(drink) {
                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    if (ch.dataset.correct === 'true') ch.classList.add('correct-reveal');
                });
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            // ── LEVEL 2 (Pick from All Ingredients) ──
            function renderL2(drink) {
                hintText.textContent = 'Select all correct ingredients from the FULL list below.';
                const correctSet = new Set(drink.ingredients.map(i=>i.full));
                const allIngs = [...new Set(cocktails.flatMap(c=>c.ingredients.map(i=>i.full)))].sort();
                let html = '<div class="ingredient-grid all-ingredients">';
                allIngs.forEach(opt => {
                    html += `<span class="ing-chit" data-ing="${escapeHTML(opt)}" data-correct="${correctSet.has(opt)}">${escapeHTML(opt)}</span>`;
                });
                html += '</div>';
                quizContent.innerHTML = html;
                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    ch.addEventListener('click', () => {
                        if (isRevealed) return;
                        ch.classList.toggle('selected');
                    });
                });
            }

            function checkL2(drink) {
                checkL1(drink); // same logic, just larger set
            }

            function skipL2(drink) {
                skipL1(drink);
            }

            // ── LEVEL 3 (Roles) ──
            function renderL3(drink) {
                hintText.textContent = 'Type ingredients into each category.';
                const roles = { spirit:[], liqueur:[], mixer:[], other:[] };
                drink.ingredients.forEach(i => roles[i.role].push(i));
                const labels = { spirit:'Spirits', liqueur:'Liqueurs/Syrups', mixer:'Juices/Mixers', other:'Other' };
                let html = '<div class="role-slots">';
                ['spirit','liqueur','mixer','other'].forEach(role => {
                    if (roles[role].length === 0) return;
                    html += `<div class="role-slot"><label>${labels[role]} (${roles[role].length})</label>
                        <input type="text" class="role-input" data-role="${role}" placeholder="Type here...">
                        <div class="role-feedback" data-fb="${role}"></div></div>`;
                });
                html += '</div>';
                quizContent.innerHTML = html;
            }

            function checkL3(drink) {
                const roles = { spirit:[], liqueur:[], mixer:[], other:[] };
                drink.ingredients.forEach(i => roles[i.role].push(i));
                let totalOk = 0;
                const totalExp = drink.ingredients.length;
                quizContent.querySelectorAll('.role-input').forEach(inp => {
                    const role = inp.dataset.role;
                    const exp = roles[role] || [];
                    const parts = inp.value.split(/[,;]+/).map(s=>s.trim()).filter(s=>s.length>0);
                    const used = new Set();
                    const matched = [];
                    const extra = [];
                    parts.forEach(p => {
                        let found = false;
                        for (const ing of exp) {
                            if (used.has(ing.full)) continue;
                            if (ingMatch(p, ing.matchKeys)) { matched.push(ing); used.add(ing.full); found = true; break; }
                        }
                        if (!found) extra.push(p);
                    });
                    const missed = exp.filter(i=>!used.has(i.full));
                    totalOk += matched.length;
                    const fb = quizContent.querySelector(`[data-fb="${role}"]`);
                    fb.innerHTML = (missed.length ? `<span class="missed">Missed: ${missed.map(i=>i.full).join(', ')}</span> ` : '') +
                        (extra.length ? `<span class="extra">Extra: ${extra.join(', ')}</span>` : '');
                    inp.className = 'role-input ' + (missed.length===0 && extra.length===0 && matched.length===exp.length ? 'correct' :
                        (matched.length >= exp.length*0.5 ? 'partial' : 'incorrect'));
                });
                finishQuiz(drink, totalOk === totalExp, totalOk === totalExp ? '✅ Perfect!' : `${totalOk}/${totalExp} correct.`);
            }

            function skipL3(drink) {
                const roles = { spirit:[], liqueur:[], mixer:[], other:[] };
                drink.ingredients.forEach(i => roles[i.role].push(i));
                quizContent.querySelectorAll('.role-input').forEach(inp => {
                    const role = inp.dataset.role;
                    inp.value = (roles[role]||[]).map(i=>i.full).join(', ');
                    inp.classList.add('correct');
                });
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            // ── LEVEL 4 (Blank Build) ──
            function renderL4(drink) {
                hintText.textContent = `List all ${drink.ingredients.length} ingredients from memory.`;
                quizContent.innerHTML = `<textarea class="blank-input" id="blankInput" placeholder="Type ingredients, separated by commas..."></textarea>`;
            }

            function checkL4(drink) {
                const ta = $('blankInput');
                const parts = ta.value.split(/[,;\n]+/).map(s=>s.trim()).filter(s=>s.length>0);
                const used = new Set();
                const matched = [];
                const extra = [];
                parts.forEach(p => {
                    let found = false;
                    for (const ing of drink.ingredients) {
                        if (used.has(ing.full)) continue;
                        if (ingMatch(p, ing.matchKeys)) { matched.push(ing); used.add(ing.full); found = true; break; }
                    }
                    if (!found) extra.push(p);
                });
                const missed = drink.ingredients.filter(i=>!used.has(i.full));
                const allOk = matched.length === drink.ingredients.length && extra.length === 0;
                let msg = '';
                if (allOk) msg = '✅ Perfect recall!';
                else {
                    let partsMsg = [];
                    if (missed.length) partsMsg.push('Missed: ' + missed.map(i=>i.full).join(', '));
                    if (extra.length) partsMsg.push('Extra: ' + extra.join(', '));
                    msg = `${matched.length}/${drink.ingredients.length} correct. ${partsMsg.join(' | ')}`;
                }
                finishQuiz(drink, allOk, msg);
                ta.disabled = true;
            }

            function skipL4(drink) {
                const ta = $('blankInput');
                ta.value = drink.ingredients.map(i=>i.full).join(', ');
                ta.disabled = true;
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            // ── LEVEL 5 (Full Recipe with Measurements) ──
            function renderL5(drink) {
                hintText.textContent = `List ingredients WITH measurements (e.g. "50ml Vodka").`;
                quizContent.innerHTML = `<textarea class="blank-input" id="blankInput" placeholder="50ml Absolut Vanilla Vodka, 25ml Coffee..."></textarea>`;
            }

            function parsePairs(str) {
                const parts = str.split(/[,;\n]+/).map(s=>s.trim()).filter(s=>s.length>0);
                return parts.map(p => {
                    const m = p.match(/^([\d\/.\s]*(?:ml|oz|dash|dashes|barspoon|tsp|tbsp|cup|cl|shot|parts?|to\s+taste)?)\s*(.+)$/i);
                    if (m && m[1].trim()) return { meas: m[1].trim(), name: m[2].trim(), raw: p };
                    return { meas: '', name: p, raw: p };
                });
            }

            function checkL5(drink) {
                const ta = $('blankInput');
                const pairs = parsePairs(ta.value);
                const used = new Set();
                const results = [];
                pairs.forEach(pair => {
                    let best = null;
                    for (const ing of drink.ingredients) {
                        if (used.has(ing.full)) continue;
                        if (ingMatch(pair.name, ing.matchKeys)) { best = ing; break; }
                    }
                    if (best) {
                        used.add(best.full);
                        results.push({ ing: best, meas: pair.meas, measOk: norm(pair.meas) === norm(best.measurement) });
                    } else {
                        results.push({ ing: null, meas: pair.meas, raw: pair.raw, unknown: true });
                    }
                });
                const missed = drink.ingredients.filter(i=>!used.has(i.full));
                const allFound = missed.length === 0 && !results.some(r=>r.unknown);
                const allMeasOk = !results.some(r=>r.ing && !r.measOk);
                const perfect = allFound && allMeasOk;
                let msg = '';
                if (perfect) msg = '✅ Perfect! All ingredients & measurements correct.';
                else {
                    let bits = [];
                    if (missed.length) bits.push('Missing: ' + missed.map(i=>`${i.full} (${i.measurement||'?'})`).join(', '));
                    const wrongMeas = results.filter(r=>r.ing && !r.measOk);
                    if (wrongMeas.length) bits.push('Wrong measurements: ' + wrongMeas.map(r=>`"${r.raw}" → "${r.ing.full}: ${r.ing.measurement}"`).join('; '));
                    const unk = results.filter(r=>r.unknown);
                    if (unk.length) bits.push('Unrecognized: ' + unk.map(r=>`"${r.raw}"`).join(', '));
                    msg = bits.join('. ');
                }
                finishQuiz(drink, perfect, msg);
                ta.disabled = true;
            }

            function skipL5(drink) {
                const ta = $('blankInput');
                ta.value = drink.ingredients.map(i => (i.measurement ? i.measurement + ' ' : '') + i.full).join(', ');
                ta.disabled = true;
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            function finishQuiz(drink, correct, msg) {
                isRevealed = true;
                btnSubmit.style.display = 'none';
                btnSkip.style.display = 'none';
                btnNext.style.display = '';
                recordAttempt(drink.name, currentLevel, correct);
                resultBanner.innerHTML = `<div class="result-banner ${correct?'perfect':(msg.includes('Close')||msg.includes('correct')?'good':'poor')}">${msg}</div>`;
                updateProgress();
            }

            // ─────────────────────────────────────
            // PROGRESS
            // ─────────────────────────────────────
            function updateProgress() {
                progressLevelLabel.textContent = currentLevel;
                const drinks = currentCategory === 'all' ? [...cocktails] : cocktails.filter(c => {
                    if (currentCategory === 'focus') return c.focus;
                    return c.category === currentCategory;
                });
                let html = '';
                drinks.forEach(d => {
                    const pct = getPct(d.name, currentLevel);
                    const w = pct !== null ? pct : 0;
                    const cls = pct !== null ? (pct >= 80 ? 'high' : (pct >= 50 ? 'mid' : 'low')) : 'low';
                    html += `<div class="progress-item"><span class="p-name">${escapeHTML(d.name)}</span>
                        <div class="progress-bar-mini"><div class="fill ${cls}" style="width:${w}%"></div></div>
                        <span class="pct">${pct !== null ? pct+'%' : '--'}</span></div>`;
                });
                progressGrid.innerHTML = html || '<div style="text-align:center;color:var(--text-dim);">No drinks.</div>';
            }

            // ─────────────────────────────────────
            // CHEAT SHEET
            // ─────────────────────────────────────
            function buildCheatSheet() {
                const grouped = {};
                cocktails.forEach(c => {
                    if (!grouped[c.category]) grouped[c.category] = [];
                    grouped[c.category].push(c);
                });
                let html = '<h3>📋 Full Menu</h3>';
                for (const [cat, drinks] of Object.entries(grouped)) {
                    html += `<h4 style="color:var(--gold);margin-top:10px;">${cat}</h4>`;
                    drinks.forEach(d => {
                        const focusMark = d.focus ? ' 🎯' : '';
                        html += `<div class="cheat-drink"><div class="cd-name">${escapeHTML(d.name)}${focusMark}</div>
                            <div class="cd-ingredients">${d.ingredients.map(i=>(i.measurement?i.measurement+' ':'')+i.full).join(' · ')}</div></div>`;
                    });
                }
                cheatSheet.innerHTML = html;
            }

            // ─────────────────────────────────────
            // SETTINGS MODAL (with Focus toggles)
            // ─────────────────────────────────────
            function openSettings() {
                const grouped = {};
                cocktails.forEach(c => {
                    if (!grouped[c.category]) grouped[c.category] = [];
                    grouped[c.category].push(c);
                });
                let html = '<h2>⚙️ Measurements & Focus <button class="modal-close" id="closeSettingsBtn">&times;</button></h2>';
                html += '<p style="color:var(--text-dim);margin-bottom:10px;font-size:0.8rem;">Enter measurements and check Focus for cocktails you want to prioritise.</p>';
                for (const [cat, drinks] of Object.entries(grouped)) {
                    html += `<h3 style="color:var(--gold);margin-top:12px;font-size:0.9rem;">${cat}</h3>`;
                    drinks.forEach(d => {
                        html += `<div class="settings-drink"><h4>
                            <input type="checkbox" class="focus-checkbox" data-drink="${escapeHTML(d.name)}" ${d.focus ? 'checked' : ''}>
                            ${escapeHTML(d.name)}
                        </h4>`;
                        d.ingredients.forEach(ing => {
                            html += `<div class="settings-ingredient"><label>${escapeHTML(ing.full)}</label>
                                <input type="text" class="meas-input" data-drink="${escapeHTML(d.name)}" data-ing="${escapeHTML(ing.full)}" value="${escapeHTML(ing.measurement||'')}" placeholder="e.g. 50ml"></div>`;
                        });
                        html += '</div>';
                    });
                }
                html += '<button class="save-settings-btn" id="saveSettingsBtn">💾 Save & Close</button>';
                settingsContent.innerHTML = html;
                settingsModal.classList.add('open');
                $('closeSettingsBtn').addEventListener('click', () => settingsModal.classList.remove('open'));
                $('saveSettingsBtn').addEventListener('click', saveSettings);
            }

            function saveSettings() {
                // Measurements
                const measMap = {};
                settingsContent.querySelectorAll('.meas-input').forEach(inp => {
                    const val = inp.value.trim();
                    if (val) measMap[inp.dataset.drink + '||' + inp.dataset.ing] = val;
                });
                saveMeasurements(measMap);

                // Focus
                const newFocus = new Set();
                settingsContent.querySelectorAll('.focus-checkbox').forEach(cb => {
                    if (cb.checked) newFocus.add(cb.dataset.drink);
                });
                saveFocusSet(newFocus);
                focusSet = newFocus;

                // Rebuild cocktails with new data
                cocktails = buildCocktails();
                updateFilteredDrinks();
                buildCheatSheet();
                settingsModal.classList.remove('open');
                updateProgress();
                resetQuiz();
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            catBar.addEventListener('click', e => {
                const pill = e.target.closest('.cat-pill');
                if (!pill) return;
                currentCategory = pill.dataset.cat;
                catBar.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                updateFilteredDrinks();
                updateProgress();
                resetQuiz();
            });

            diffBar.addEventListener('click', e => {
                const tab = e.target.closest('.diff-tab');
                if (!tab) return;
                currentLevel = parseInt(tab.dataset.level);
                diffBar.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                updateProgress();
                resetQuiz();
            });

            btnSubmit.addEventListener('click', () => {
                if (isRevealed || currentDrinkIndex < 0) return;
                const drink = filteredDrinks[currentDrinkIndex];
                if (currentLevel === 1) checkL1(drink);
                else if (currentLevel === 2) checkL2(drink);
                else if (currentLevel === 3) checkL3(drink);
                else if (currentLevel === 4) checkL4(drink);
                else if (currentLevel === 5) checkL5(drink);
            });

            btnSkip.addEventListener('click', () => {
                if (isRevealed || currentDrinkIndex < 0) return;
                const drink = filteredDrinks[currentDrinkIndex];
                if (currentLevel === 1) skipL1(drink);
                else if (currentLevel === 2) skipL2(drink);
                else if (currentLevel === 3) skipL3(drink);
                else if (currentLevel === 4) skipL4(drink);
                else if (currentLevel === 5) skipL5(drink);
            });

            btnNext.addEventListener('click', loadDrink);

            $('btnResetProgress').addEventListener('click', () => {
                if (confirm('Reset all progress?')) {
                    progressData = {};
                    saveProgress(progressData);
                    updateProgress();
                    resetQuiz();
                }
            });

            cheatToggle.addEventListener('click', () => {
                cheatSheet.classList.toggle('open');
                cheatToggle.textContent = cheatSheet.classList.contains('open') ? '📋 Hide Menu ▴' : '📋 Show Full Menu ▾';
            });

            $('openSettingsBtn').addEventListener('click', openSettings);
            settingsModal.addEventListener('click', e => {
                if (e.target === settingsModal) settingsModal.classList.remove('open');
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !isRevealed && currentDrinkIndex >= 0 && document.activeElement?.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    btnSubmit.click();
                }
                if ((e.key === 'ArrowRight' || (e.ctrlKey && e.key === 'Enter')) && isRevealed) {
                    e.preventDefault();
                    btnNext.click();
                }
            });

            // ─────────────────────────────────────
            // INIT
            // ─────────────────────────────────────
            function init() {
                updateFilteredDrinks();
                buildCheatSheet();
                updateProgress();
                loadDrink();
                // Ensure focus pill state
                if (currentCategory === 'focus') {
                    const focusPill = catBar.querySelector('.focus-pill');
                    if (focusPill) focusPill.classList.add('active');
                }
            }
            init();
        })();
    </script>
</body>
</html>
