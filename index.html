            // ── LEVEL 1 ──
            function renderL1(drink) {
                hintText.textContent = 'Tap all correct ingredients, then pick glassware and garnishes.';
                const correctSet = new Set(drink.ingredients.map(i => i.full));
                const allIngs = [...new Set(cocktails.flatMap(c => c.ingredients.map(i => i.full)))];
                const decoys = shuffle(allIngs.filter(i => !correctSet.has(i))).slice(0, Math.min(6, allIngs.length -
                    correctSet.size));
                const options = shuffle([...drink.ingredients.map(i => i.full), ...decoys]);

                let html = '<div class="ingredient-grid">';
                options.forEach(opt => {
                    html +=
                        `<span class="ing-chit" data-ing="${escapeHTML(opt)}" data-correct="${correctSet.has(opt)}">${escapeHTML(opt)}</span>`;
                });
                html += '</div>';

                const allGlass = getAllGlassware();
                html += buildSelectRow(allGlass, new Set(), 'Glassware');

                const allGarn = getAllGarnishItems();
                html += buildSelectRow(allGarn, new Set(), 'Garnish');

                quizContent.innerHTML = html;

                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    ch.addEventListener('click', () => {
                        if (isRevealed) return;
                        ch.classList.toggle('selected');
                    });
                });

                const glassRows = quizContent.querySelectorAll('.select-row');
                if (glassRows.length >= 2) {
                    const glassRow = glassRows[0];
                    const glassChits = glassRow.querySelectorAll('.chit');
                    glassChits.forEach(ch => {
                        ch.addEventListener('click', () => {
                            if (isRevealed) return;
                            glassChits.forEach(c => c.classList.remove('selected'));
                            ch.classList.add('selected');
                        });
                    });

                    const garnishRow = glassRows[1];
                    garnishRow.querySelectorAll('.chit').forEach(ch => {
                        ch.addEventListener('click', () => {
                            if (isRevealed) return;
                            ch.classList.toggle('selected');
                        });
                    });
                }
            }

            function checkL1(drink) {
                const correctSet = new Set(drink.ingredients.map(i => i.full));
                let allOk = true;
                const selectedOk = new Set();
                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    const isOk = ch.dataset.correct === 'true';
                    const sel = ch.classList.contains('selected');
                    if (sel && isOk) { ch.classList.add('correct-reveal');
                        selectedOk.add(ch.dataset.ing); } else if (sel && !isOk) { ch.classList.add(
                            'incorrect-reveal');
                        allOk = false; } else if (!sel && isOk) { ch.classList.add('missed-reveal');
                        allOk = false; }
                });
                if (selectedOk.size !== correctSet.size) allOk = false;

                const glassRows = quizContent.querySelectorAll('.select-row');
                let glassOk = true;
                let garnishOk = true;
                let glassFeedback = '';
                let garnishFeedback = '';
                if (glassRows.length >= 2) {
                    const selectedGlass = [];
                    glassRows[0].querySelectorAll('.chit').forEach(ch => {
                        if (ch.classList.contains('selected')) selectedGlass.push(ch.dataset.value);
                    });
                    const correctGlass = drink.glassware || '';
                    const selectedGlassNorm = selectedGlass.map(norm);
                    const correctGlassNorm = norm(correctGlass);
                    const glassCorrect = selectedGlassNorm.length === 1 && selectedGlassNorm[0] === correctGlassNorm;
                    if (!glassCorrect) {
                        allOk = false;
                        glassOk = false;
                        const selectedStr = selectedGlass.join(', ') || 'nothing';
                        glassFeedback = `Glassware: expected "${correctGlass}", you selected "${selectedStr}"`;
                        glassRows[0].querySelectorAll('.chit').forEach(ch => {
                            if (norm(ch.dataset.value) === correctGlassNorm) ch.classList.add('correct-reveal');
                            else if (ch.classList.contains('selected')) ch.classList.add('incorrect-reveal');
                        });
                    } else {
                        glassFeedback = '';
                        glassRows[0].querySelectorAll('.chit').forEach(ch => {
                            if (ch.classList.contains('selected')) ch.classList.add('correct-reveal');
                        });
                    }

                    const selectedGarn = [];
                    glassRows[1].querySelectorAll('.chit').forEach(ch => {
                        if (ch.classList.contains('selected')) selectedGarn.push(ch.dataset.value);
                    });
                    const correctGarnSet = garnishSet(drink.garnish);
                    const selectedGarnSet = new Set(selectedGarn.map(norm));
                    const garnCorrect = selectedGarnSet.size === correctGarnSet.size &&
                        [...selectedGarnSet].every(v => correctGarnSet.has(v));
                    if (!garnCorrect) {
                        allOk = false;
                        garnishOk = false;
                        const missing = [...correctGarnSet].filter(v => !selectedGarnSet.has(v));
                        const extra = selectedGarn.filter(p => !correctGarnSet.has(norm(p)));
                        let parts = [];
                        if (missing.length) parts.push('Missing: ' + missing.join(', '));
                        if (extra.length) parts.push('Extra: ' + extra.join(', '));
                        garnishFeedback = parts.join('; ');
                        glassRows[1].querySelectorAll('.chit').forEach(ch => {
                            const val = norm(ch.dataset.value);
                            if (correctGarnSet.has(val)) {
                                if (!ch.classList.contains('selected')) ch.classList.add('missed-reveal');
                                else ch.classList.add('correct-reveal');
                            } else if (ch.classList.contains('selected')) {
                                ch.classList.add('incorrect-reveal');
                            }
                        });
                    } else {
                        garnishFeedback = '';
                        glassRows[1].querySelectorAll('.chit').forEach(ch => {
                            if (ch.classList.contains('selected')) ch.classList.add('correct-reveal');
                        });
                    }
                } else {
                    allOk = false;
                }

                const perfect = allOk;
                let msg = perfect ? '✅ Perfect!' :
                    (selectedOk.size >= correctSet.size * 0.6 ? '👍 Close!' : '❌ Keep studying.');
                if (glassFeedback) msg += ' ' + glassFeedback;
                if (garnishFeedback) msg += ' ' + garnishFeedback;
                finishQuiz(drink, perfect, msg);
            }

            function skipL1(drink) {
                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    if (ch.dataset.correct === 'true') ch.classList.add('correct-reveal');
                });
                const glassRows = quizContent.querySelectorAll('.select-row');
                if (glassRows.length >= 2) {
                    const correctGlass = drink.glassware || '';
                    glassRows[0].querySelectorAll('.chit').forEach(ch => {
                        if (norm(ch.dataset.value) === norm(correctGlass)) ch.classList.add('correct-reveal');
                    });
                    const correctGarnSet = garnishSet(drink.garnish);
                    glassRows[1].querySelectorAll('.chit').forEach(ch => {
                        if (correctGarnSet.has(norm(ch.dataset.value))) ch.classList.add('correct-reveal');
                    });
                }
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            // ── LEVEL 2 ──
            function renderL2(drink) {
                hintText.textContent = 'Select all correct ingredients from the FULL list, plus glassware and garnish.';
                const correctSet = new Set(drink.ingredients.map(i => i.full));
                const allIngs = [...new Set(cocktails.flatMap(c => c.ingredients.map(i => i.full)))].sort();
                let html = '<div class="ingredient-grid all-ingredients">';
                allIngs.forEach(opt => {
                    html +=
                        `<span class="ing-chit" data-ing="${escapeHTML(opt)}" data-correct="${correctSet.has(opt)}">${escapeHTML(opt)}</span>`;
                });
                html += '</div>';

                const allGlass = getAllGlassware();
                html += buildSelectRow(allGlass, new Set(), 'Glassware');

                const allGarn = getAllGarnishItems();
                html += buildSelectRow(allGarn, new Set(), 'Garnish');

                quizContent.innerHTML = html;

                quizContent.querySelectorAll('.ing-chit').forEach(ch => {
                    ch.addEventListener('click', () => {
                        if (isRevealed) return;
                        ch.classList.toggle('selected');
                    });
                });

                const glassRows = quizContent.querySelectorAll('.select-row');
                if (glassRows.length >= 2) {
                    const glassRow = glassRows[0];
                    const glassChits = glassRow.querySelectorAll('.chit');
                    glassChits.forEach(ch => {
                        ch.addEventListener('click', () => {
                            if (isRevealed) return;
                            glassChits.forEach(c => c.classList.remove('selected'));
                            ch.classList.add('selected');
                        });
                    });
                    const garnishRow = glassRows[1];
                    garnishRow.querySelectorAll('.chit').forEach(ch => {
                        ch.addEventListener('click', () => {
                            if (isRevealed) return;
                            ch.classList.toggle('selected');
                        });
                    });
                }
            }

            function checkL2(drink) { checkL1(drink); }

            function skipL2(drink) { skipL1(drink); }

            // ── LEVEL 3 ──
            function renderL3(drink) {
                hintText.textContent = l3HintsVisible ? 'Type ingredients into each category, plus glassware and garnish.' :
                    'Type ingredients into each category, plus glassware and garnish. (hints hidden)';
                const roles = { spirit: [], liqueur: [], mixer: [], other: [] };
                drink.ingredients.forEach(i => roles[i.role].push(i));
                const labels = { spirit: 'Spirits', liqueur: 'Liqueurs/Syrups', mixer: 'Juices/Mixers',
                    other: 'Other' };
                let html = '<div class="role-slots">';
                ['spirit', 'liqueur', 'mixer', 'other'].forEach(role => {
                    if (roles[role].length === 0) return;
                    const countDisplay = l3HintsVisible ? ` (${roles[role].length})` : '';
                    html += `<div class="role-slot"><label>${labels[role]}${countDisplay}</label>
                        <input type="text" class="role-input" data-role="${role}" placeholder="Type here...">
                        <div class="role-feedback" data-fb="${role}"></div></div>`;
                });
                html += '</div>';

                html += `<div class="extra-fields">
                    <div class="field"><label>Glassware</label>
                        <input type="text" id="l3Glassware" placeholder="e.g. Coupe">
                        <div class="fb" id="l3GlassFb"></div>
                    </div>
                    <div class="field"><label>Garnish</label>
                        <input type="text" id="l3Garnish" placeholder="e.g. lime wheel, mint sprig">
                        <div class="fb" id="l3GarnishFb"></div>
                    </div>
                </div>`;

                quizContent.innerHTML = html;

                if (!l3HintsVisible) {
                    ingCount.textContent = '🫣 hints hidden';
                } else {
                    ingCount.textContent = drink.ingredients.length + ' ingredients';
                }
            }

            function checkL3(drink) {
                const roles = { spirit: [], liqueur: [], mixer: [], other: [] };
                drink.ingredients.forEach(i => roles[i.role].push(i));
                let totalOk = 0;
                const totalExp = drink.ingredients.length;
                let roleOk = true;
                quizContent.querySelectorAll('.role-input').forEach(inp => {
                    const role = inp.dataset.role;
                    const exp = roles[role] || [];
                    const parts = inp.value.split(/[,;]+/).map(s => s.trim()).filter(s => s.length > 0);
                    const used = new Set();
                    const matched = [];
                    const extra = [];
                    parts.forEach(p => {
                        let found = false;
                        for (const ing of exp) {
                            if (used.has(ing.full)) continue;
                            if (ingMatch(p, ing.matchKeys)) { matched.push(ing);
                                used.add(ing.full);
                                found = true; break; }
                        }
                        if (!found) extra.push(p);
                    });
                    const missed = exp.filter(i => !used.has(i.full));
                    totalOk += matched.length;
                    const fb = quizContent.querySelector(`[data-fb="${role}"]`);
                    fb.innerHTML = (missed.length ? `<span class="missed">Missed: ${missed.map(i=>i.full).join(', ')}</span> ` :
                        '') +
                        (extra.length ? `<span class="extra">Extra: ${extra.join(', ')}</span>` : '');
                    inp.className = 'role-input ' + (missed.length === 0 && extra.length === 0 && matched.length === exp
                        .length ? 'correct' :
                        (matched.length >= exp.length * 0.5 ? 'partial' : 'incorrect'));
                    if (missed.length || extra.length || matched.length !== exp.length) roleOk = false;
                });

                const glassInput = $('l3Glassware');
                const glassFb = $('l3GlassFb');
                const glassVal = glassInput.value.trim();
                const correctGlass = drink.glassware || '';
                const glassOk = norm(glassVal) === norm(correctGlass) && glassVal.length > 0;
                glassInput.className = glassOk ? 'correct' : (glassVal.length > 0 ? 'incorrect' : '');
                if (glassOk) {
                    glassFb.textContent = '';
                } else {
                    if (glassVal.length === 0) {
                        glassFb.textContent = `Required: "${correctGlass}"`;
                    } else {
                        glassFb.textContent = `Expected: "${correctGlass}", got "${glassVal}"`;
                    }
                }

                const garnInput = $('l3Garnish');
                const garnFb = $('l3GarnishFb');
                const garnParts = garnInput.value.split(/[,;]+/).map(s => s.trim()).filter(s => s.length > 0);
                const userGarnSet = new Set(garnParts.map(norm));
                const correctGarnSet = garnishSet(drink.garnish);
                const garnOk = userGarnSet.size === correctGarnSet.size &&
                    [...userGarnSet].every(v => correctGarnSet.has(v));
                garnInput.className = garnOk ? 'correct' : (garnParts.length > 0 ? 'incorrect' : '');
                const missing = [...correctGarnSet].filter(v => !userGarnSet.has(v));
                const extra = garnParts.filter(p => !correctGarnSet.has(norm(p)));
                let garnMsg = '';
                if (!garnOk) {
                    if (missing.length) garnMsg += 'Missing: ' + missing.join(', ');
                    if (extra.length) garnMsg += (garnMsg ? '; ' : '') + 'Extra: ' + extra.join(', ');
                }
                garnFb.textContent = garnMsg;

                const perfect = roleOk && glassOk && garnOk;
                const msg = perfect ? '✅ Perfect!' :
                    (totalOk >= totalExp * 0.6 ? '👍 Close!' : '❌ Keep studying.');
                finishQuiz(drink, perfect, msg);
            }

            function skipL3(drink) {
                const roles = { spirit: [], liqueur: [], mixer: [], other: [] };
                drink.ingredients.forEach(i => roles[i.role].push(i));
                quizContent.querySelectorAll('.role-input').forEach(inp => {
                    const role = inp.dataset.role;
                    inp.value = (roles[role] || []).map(i => i.full).join(', ');
                    inp.classList.add('correct');
                });
                const glassInput = $('l3Glassware');
                glassInput.value = drink.glassware || '';
                glassInput.classList.add('correct');
                const garnInput = $('l3Garnish');
                garnInput.value = drink.garnish || '';
                garnInput.classList.add('correct');
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            function toggleL3Hints() {
                l3HintsVisible = !l3HintsVisible;
                l3ToggleBtn.textContent = l3HintsVisible ? '👁️ Hide hints' : '👁️ Show hints';
                if (currentDrinkIndex >= 0 && filteredDrinks[currentDrinkIndex]) {
                    const drink = filteredDrinks[currentDrinkIndex];
                    renderL3(drink);
                }
            }

            // ── LEVEL 4 ──
            function renderL4(drink) {
                const total = drink.ingredients.length;
                hintText.textContent = l4HintsVisible ?
                    `List all ${total} ingredients WITH measurements, plus glassware and garnish.` :
                    'List all ingredients WITH measurements, plus glassware and garnish. (count hidden)';
                let html = `<textarea class="blank-input" id="blankInput" placeholder="50ml vanilla vodka, 25ml coffee..."></textarea>`;
                html += `<div class="extra-fields">
                    <div class="field"><label>Glassware</label>
                        <input type="text" id="l4Glassware" placeholder="e.g. Coupe">
                        <div class="fb" id="l4GlassFb"></div>
                    </div>
                    <div class="field"><label>Garnish</label>
                        <input type="text" id="l4Garnish" placeholder="e.g. lime wheel, mint sprig">
                        <div class="fb" id="l4GarnishFb"></div>
                    </div>
                </div>`;
                quizContent.innerHTML = html;
                if (!l4HintsVisible) {
                    ingCount.textContent = '🫣 count hidden';
                } else {
                    ingCount.textContent = total + ' ingredients';
                }
            }

            function parsePairs(str) {
                const parts = str.split(/[,;\n]+/).map(s => s.trim()).filter(s => s.length > 0);
                return parts.map(p => {
                    // FIX: match "top" as a valid measurement unit
                    const m = p.match(/^([\d\/.\s]*(?:ml|oz|dash|dashes|barspoon|tsp|tbsp|cup|cl|shot|parts?|to\s+taste|top)?)\s*(.+)$/i);
                    if (m && m[1].trim()) return { meas: m[1].trim(), name: m[2].trim(), raw: p };
                    return { meas: '', name: p, raw: p };
                });
            }

            function checkL4(drink) {
                const ta = $('blankInput');
                const pairs = parsePairs(ta.value);
                const used = new Set();
                const results = [];
                const matchedNames = [];

                pairs.forEach(pair => {
                    let best = null;
                    for (const ing of drink.ingredients) {
                        if (used.has(ing.full)) continue;
                        if (ingMatch(pair.name, ing.matchKeys)) {
                            best = ing;
                            break;
                        }
                    }
                    if (best) {
                        used.add(best.full);
                        const hasMeas = pair.meas && pair.meas.length > 0;
                        const measOk = hasMeas && norm(pair.meas) === norm(best.measurement);
                        results.push({
                            ing: best,
                            meas: pair.meas,
                            measOk: measOk,
                            matched: true,
                            hasMeas: hasMeas
                        });
                        matchedNames.push(best.full);
                    } else {
                        results.push({
                            ing: null,
                            meas: pair.meas,
                            raw: pair.raw,
                            unknown: true,
                            matched: false
                        });
                    }
                });

                const missed = drink.ingredients.filter(i => !used.has(i.full));
                const allFound = missed.length === 0 && !results.some(r => r.unknown);
                const allMeasOk = results.every(r => r.matched ? (r.hasMeas && r.measOk) : true);
                const ingredientsPerfect = allFound && allMeasOk;

                const glassInput = $('l4Glassware');
                const glassFb = $('l4GlassFb');
                const glassVal = glassInput.value.trim();
                const correctGlass = drink.glassware || '';
                const glassOk = norm(glassVal) === norm(correctGlass) && glassVal.length > 0;
                glassInput.className = glassOk ? 'correct' : (glassVal.length > 0 ? 'incorrect' : '');
                if (glassOk) {
                    glassFb.textContent = '';
                } else {
                    if (glassVal.length === 0) {
                        glassFb.textContent = `Required: "${correctGlass}"`;
                    } else {
                        glassFb.textContent = `Expected: "${correctGlass}", got "${glassVal}"`;
                    }
                }

                const garnInput = $('l4Garnish');
                const garnFb = $('l4GarnishFb');
                const garnParts = garnInput.value.split(/[,;]+/).map(s => s.trim()).filter(s => s.length > 0);
                const userGarnSet = new Set(garnParts.map(norm));
                const correctGarnSet = garnishSet(drink.garnish);
                const garnOk = userGarnSet.size === correctGarnSet.size &&
                    [...userGarnSet].every(v => correctGarnSet.has(v));
                garnInput.className = garnOk ? 'correct' : (garnParts.length > 0 ? 'incorrect' : '');
                const missingGarn = [...correctGarnSet].filter(v => !userGarnSet.has(v));
                const extraGarn = garnParts.filter(p => !correctGarnSet.has(norm(p)));
                let garnMsg = '';
                if (!garnOk) {
                    if (missingGarn.length) garnMsg += 'Missing: ' + missingGarn.join(', ');
                    if (extraGarn.length) garnMsg += (garnMsg ? '; ' : '') + 'Extra: ' + extraGarn.join(', ');
                }
                garnFb.textContent = garnMsg;

                const perfect = ingredientsPerfect && glassOk && garnOk;

                let msg = '';
                if (perfect) {
                    msg = '✅ Perfect! All ingredients, measurements, glassware and garnish correct.';
                } else {
                    let feedbackParts = [];
                    if (missed.length) {
                        feedbackParts.push('❌ Missing ingredients: ' + missed.map(i =>
                            `${i.full} (${i.measurement || 'no meas'})`).join(', '));
                    }
                    const badMeas = results.filter(r => r.matched && (!r.hasMeas || !r.measOk));
                    if (badMeas.length) {
                        const details = badMeas.map(r => {
                            if (!r.hasMeas) return `"${r.raw}" → missing measurement (expected "${r.ing.measurement}")`;
                            return `"${r.raw}" → wrong measurement (expected "${r.ing.measurement}")`;
                        });
                        feedbackParts.push('⚠️ Measurement issue: ' + details.join('; '));
                    }
                    const unk = results.filter(r => r.unknown);
                    if (unk.length) {
                        feedbackParts.push('❓ Unrecognized: ' + unk.map(r => `"${r.raw}"`).join(', '));
                    }
                    if (!glassOk) {
                        feedbackParts.push(`❌ Glassware: expected "${correctGlass}"`);
                    }
                    if (!garnOk) {
                        if (missingGarn.length || extraGarn.length) {
                            feedbackParts.push('❌ Garnish: ' + garnMsg);
                        } else {
                            feedbackParts.push('❌ Garnish: expected "' + (drink.garnish || '') + '"');
                        }
                    }
                    if (feedbackParts.length === 0) {
                        feedbackParts.push('Check your answers again.');
                    }
                    msg = feedbackParts.join('. ');
                }

                finishQuiz(drink, perfect, msg);
                ta.disabled = true;
            }

            function skipL4(drink) {
                const ta = $('blankInput');
                ta.value = drink.ingredients.map(i => (i.measurement ? i.measurement + ' ' : '') + i.full).join(', ');
                ta.disabled = true;
                const glassInput = $('l4Glassware');
                glassInput.value = drink.glassware || '';
                glassInput.classList.add('correct');
                const garnInput = $('l4Garnish');
                garnInput.value = drink.garnish || '';
                garnInput.classList.add('correct');
                finishQuiz(drink, false, '📖 Answer revealed.');
            }

            function toggleL4Hints() {
                l4HintsVisible = !l4HintsVisible;
                l4ToggleBtn.textContent = l4HintsVisible ? '👁️ Hide ingredient count' :
                    '👁️ Show ingredient count';
                if (currentDrinkIndex >= 0 && filteredDrinks[currentDrinkIndex]) {
                    const drink = filteredDrinks[currentDrinkIndex];
                    renderL4(drink);
                }
            }

            // ── FINISH ──
            function finishQuiz(drink, correct, msg) {
                isRevealed = true;
                btnSubmit.style.display = 'none';
                btnSkip.style.display = 'none';
                btnNext.style.display = '';
                recordAttempt(drink.name, currentLevel, correct);
                resultBanner.innerHTML =
                    `<div class="result-banner ${correct?'perfect':(msg.includes('Close')||msg.includes('correct')?'good':'poor')}">${msg}</div>`;
                updateProgress();
            }

            // ─────────────────────────────────────
            // PROGRESS
            // ─────────────────────────────────────
            function updateProgress() {
                progressLevelLabel.textContent = currentLevel;
                const drinks = currentCategory === 'all' ? [...cocktails] : cocktails.filter(c => {
                    if (currentCategory === 'focus') return c.focus;
                    return c.category === currentCategory;
                });
                let html = '';
                drinks.forEach(d => {
                    const pct = getPct(d.name, currentLevel);
                    const w = pct !== null ? pct : 0;
                    const cls = pct !== null ? (pct >= 80 ? 'high' : (pct >= 50 ? 'mid' : 'low')) : 'low';
                    html += `<div class="progress-item"><span class="p-name">${escapeHTML(d.name)}</span>
                        <div class="progress-bar-mini"><div class="fill ${cls}" style="width:${w}%"></div></div>
                        <span class="pct">${pct !== null ? pct+'%' : '--'}</span></div>`;
                });
                progressGrid.innerHTML = html || '<div style="text-align:center;color:var(--text-dim);">No drinks.</div>';
            }

            // ─────────────────────────────────────
            // CHEAT SHEET
            // ─────────────────────────────────────
            function buildCheatSheet() {
                const grouped = {};
                cocktails.forEach(c => {
                    if (!grouped[c.category]) grouped[c.category] = [];
                    grouped[c.category].push(c);
                });
                let html = '<h3>📋 Full Menu</h3>';
                for (const [cat, drinks] of Object.entries(grouped)) {
                    html += `<h4 style="color:var(--gold);margin-top:10px;">${cat}</h4>`;
                    drinks.forEach(d => {
                        const focusMark = d.focus ? ' 🎯' : '';
                        const customMark = d._custom ? ' ✨' : '';
                        const glass = d.glassware ? ' | 🍸 ' + d.glassware : '';
                        const garn = d.garnish ? ' | 🌿 ' + d.garnish : '';
                        html += `<div class="cheat-drink"><div class="cd-name">${escapeHTML(d.name)}${focusMark}${customMark}${glass}${garn}</div>
                            <div class="cd-ingredients">${d.ingredients.map(i=>(i.measurement?i.measurement+' ':'')+i.full).join(' · ')}</div></div>`;
                    });
                }
                cheatSheet.innerHTML = html;
            }

            // ─────────────────────────────────────
            // SETTINGS MODAL (unchanged)
            // ─────────────────────────────────────
            function openSettings() {
                const grouped = {};
                cocktails.forEach(c => {
                    if (!grouped[c.category]) grouped[c.category] = [];
                    grouped[c.category].push(c);
                });
                let html = '<h2>⚙️ Measurements, Ingredients & Focus <button class="modal-close" id="closeSettingsBtn">&times;</button></h2>';
                html +=
                    '<p style="color:var(--text-dim);margin-bottom:10px;font-size:0.8rem;">Edit measurements, delete or add ingredients, and toggle Focus. Custom cocktails appear at the bottom.</p>';

                for (const [cat, drinks] of Object.entries(grouped)) {
                    html += `<h3 style="color:var(--gold);margin-top:12px;font-size:0.9rem;">${cat}</h3>`;
                    drinks.forEach(d => {
                        const isCustom = d._custom || false;
                        html += `<div class="settings-drink" data-drink="${escapeHTML(d.name)}"><h4>
                            <input type="checkbox" class="focus-checkbox" data-drink="${escapeHTML(d.name)}" ${d.focus ? 'checked' : ''}>
                            ${escapeHTML(d.name)}${isCustom ? ' ✨' : ''}
                            ${isCustom ? `<span style="font-size:0.65rem;color:var(--text-dim);font-weight:400;margin-left:6px;">(custom)</span>` : ''}
                        </h4>`;

                        d.ingredients.forEach(ing => {
                            html += `<div class="settings-ingredient">
                                <label>${escapeHTML(ing.full)}</label>
                                <span class="role-badge">${ing.role}</span>
                                <input type="text" class="meas-input" data-drink="${escapeHTML(d.name)}" data-ing="${escapeHTML(ing.full)}" value="${escapeHTML(ing.measurement||'')}" placeholder="meas">
                                ${!isCustom ? `<button class="del-ing-btn" data-drink="${escapeHTML(d.name)}" data-ing="${escapeHTML(ing.full)}">✕</button>` : ''}
                            </div>`;
                        });

                        html += `<div class="add-ing-form">
                            <input type="text" class="add-ing-name" placeholder="Ingredient name" style="flex:2;min-width:80px;">
                            <select class="add-ing-role" style="flex:1;min-width:60px;">
                                <option value="spirit">spirit</option>
                                <option value="liqueur">liqueur</option>
                                <option value="mixer">mixer</option>
                                <option value="other">other</option>
                            </select>
                            <input type="text" class="add-ing-meas" placeholder="meas" style="flex:1;min-width:50px;">
                            <button class="add-ing-btn" data-drink="${escapeHTML(d.name)}">+ Add</button>
                        </div>`;

                        html += '</div>';
                    });
                }

                html += `<div class="new-cocktail-section">
                    <h3>➕ Add New Cocktail</h3>
                    <div class="field-row">
                        <input type="text" id="newCocktailName" placeholder="Cocktail name" style="flex:2;">
                        <input type="text" id="newCocktailCategory" placeholder="Category (e.g. Fruity & Refreshing)" style="flex:1.5;">
                    </div>
                    <div id="newIngredientList">
                        <div class="new-ing-row">
                            <input type="text" class="new-ing-name" placeholder="Ingredient name" style="flex:2;">
                            <select class="new-ing-role" style="flex:1;min-width:60px;">
                                <option value="spirit">spirit</option>
                                <option value="liqueur">liqueur</option>
                                <option value="mixer">mixer</option>
                                <option value="other">other</option>
                            </select>
                            <input type="text" class="new-ing-meas" placeholder="meas" style="flex:1;min-width:50px;">
                            <button class="del-new-ing">✕</button>
                        </div>
                    </div>
                    <button class="add-row-btn" id="addNewIngRow">+ Add ingredient</button>
                    <div style="margin-top:8px;">
                        <button class="save-cocktail-btn" id="saveNewCocktailBtn">💾 Save Cocktail</button>
                    </div>
                </div>`;

                html += '<button class="save-settings-btn" id="saveSettingsBtn">💾 Save All & Close</button>';
                settingsContent.innerHTML = html;
                settingsModal.classList.add('open');

                $('closeSettingsBtn').addEventListener('click', () => settingsModal.classList.remove('open'));

                settingsContent.querySelectorAll('.del-ing-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const drinkName = this.dataset.drink;
                        const ingName = this.dataset.ing;
                        if (confirm(`Delete "${ingName}" from "${drinkName}"?`)) {
                            const mods = loadMods();
                            if (!mods[drinkName]) mods[drinkName] = { deleted: [], added: [] };
                            if (!mods[drinkName].deleted) mods[drinkName].deleted = [];
                            if (!mods[drinkName].deleted.includes(ingName)) {
                                mods[drinkName].deleted.push(ingName);
                            }
                            saveMods(mods);
                            cocktails = buildCocktails();
                            updateFilteredDrinks();
                            buildCheatSheet();
                            openSettings();
                            updateProgress();
                            resetQuiz();
                        }
                    });
                });

                settingsContent.querySelectorAll('.add-ing-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const drinkName = this.dataset.drink;
                        const container = this.closest('.settings-drink');
                        const nameInput = container.querySelector('.add-ing-name');
                        const roleSelect = container.querySelector('.add-ing-role');
                        const measInput = container.querySelector('.add-ing-meas');
                        const name = nameInput.value.trim();
                        const role = roleSelect.value;
                        const measurement = measInput.value.trim();
                        if (!name) { alert('Please enter an ingredient name.'); return; }
                        const drink = cocktails.find(c => c.name === drinkName);
                        if (drink && drink.ingredients.some(i => i.full.toLowerCase() === name.toLowerCase())) {
                            alert(`"${name}" already exists in this recipe.`);
                            return;
                        }
                        const mods = loadMods();
                        if (!mods[drinkName]) mods[drinkName] = { deleted: [], added: [] };
                        if (!mods[drinkName].added) mods[drinkName].added = [];
                        mods[drinkName].added.push({
                            full: name,
                            role: role,
                            matchKeys: generateMatchKeys(name),
                            measurement: measurement
                        });
                        saveMods(mods);
                        cocktails = buildCocktails();
                        updateFilteredDrinks();
                        buildCheatSheet();
                        openSettings();
                        updateProgress();
                        resetQuiz();
                    });
                });

                $('addNewIngRow').addEventListener('click', function() {
                    const list = $('newIngredientList');
                    const row = document.createElement('div');
                    row.className = 'new-ing-row';
                    row.innerHTML = `
                        <input type="text" class="new-ing-name" placeholder="Ingredient name" style="flex:2;">
                        <select class="new-ing-role" style="flex:1;min-width:60px;">
                            <option value="spirit">spirit</option>
                            <option value="liqueur">liqueur</option>
                            <option value="mixer">mixer</option>
                            <option value="other">other</option>
                        </select>
                        <input type="text" class="new-ing-meas" placeholder="meas" style="flex:1;min-width:50px;">
                        <button class="del-new-ing">✕</button>
                    `;
                    list.appendChild(row);
                    row.querySelector('.del-new-ing').addEventListener('click', function() {
                        if (list.children.length > 1) {
                            row.remove();
                        } else {
                            alert('Keep at least one ingredient row.');
                        }
                    });
                });

                settingsContent.querySelectorAll('.new-ing-row .del-new-ing').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const row = this.closest('.new-ing-row');
                        const list = row.closest('#newIngredientList');
                        if (list.children.length > 1) {
                            row.remove();
                        } else {
                            alert('Keep at least one ingredient row.');
                        }
                    });
                });

                $('saveNewCocktailBtn').addEventListener('click', function() {
                    const name = $('newCocktailName').value.trim();
                    const category = $('newCocktailCategory').value.trim() || 'Uncategorized';
                    if (!name) { alert('Please enter a cocktail name.'); return; }
                    if (cocktails.some(c => c.name.toLowerCase() === name.toLowerCase())) {
                        alert(`A cocktail named "${name}" already exists.`);
                        return;
                    }
                    const rows = document.querySelectorAll('#newIngredientList .new-ing-row');
                    const ingredients = [];
                    let hasError = false;
                    rows.forEach(row => {
                        const ingName = row.querySelector('.new-ing-name').value.trim();
                        const role = row.querySelector('.new-ing-role').value;
                        const measurement = row.querySelector('.new-ing-meas').value.trim();
                        if (!ingName) { hasError = true; return; }
                        ingredients.push({
                            full: ingName,
                            role: role,
                            matchKeys: generateMatchKeys(ingName),
                            measurement: measurement
                        });
                    });
                    if (hasError) { alert('Please fill in all ingredient names.'); return; }
                    if (ingredients.length === 0) { alert('Add at least one ingredient.'); return; }

                    const custom = loadCustomCocktails();
                    custom.push({ name, category, glassware: '', garnish: '', ingredients });
                    saveCustomCocktails(custom);
                    cocktails = buildCocktails();
                    updateFilteredDrinks();
                    buildCheatSheet();
                    openSettings();
                    updateProgress();
                    resetQuiz();
                    const catPill = document.querySelector(`.cat-pill[data-cat="${category}"]`);
                    if (catPill) {
                        catPill.click();
                    } else {
                        document.querySelector('.cat-pill[data-cat="all"]').click();
                    }
                });

                $('saveSettingsBtn').addEventListener('click', function() {
                    const measMap = {};
                    settingsContent.querySelectorAll('.meas-input').forEach(inp => {
                        const val = inp.value.trim();
                        if (val) measMap[inp.dataset.drink + '||' + inp.dataset.ing] = val;
                    });
                    saveMeasurements(measMap);

                    const newFocus = new Set();
                    settingsContent.querySelectorAll('.focus-checkbox').forEach(cb => {
                        if (cb.checked) newFocus.add(cb.dataset.drink);
                    });
                    saveFocusSet(newFocus);
                    focusSet = newFocus;

                    cocktails = buildCocktails();
                    updateFilteredDrinks();
                    buildCheatSheet();
                    settingsModal.classList.remove('open');
                    updateProgress();
                    resetQuiz();
                });
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            catBar.addEventListener('click', e => {
                const pill = e.target.closest('.cat-pill');
                if (!pill) return;
                currentCategory = pill.dataset.cat;
                catBar.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                updateFilteredDrinks();
                updateProgress();
                resetQuiz();
            });

            diffBar.addEventListener('click', e => {
                const tab = e.target.closest('.diff-tab');
                if (!tab) return;
                const level = parseInt(tab.dataset.level);
                currentLevel = level;
                diffBar.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                updateProgress();
                resetQuiz();
            });

            btnSubmit.addEventListener('click', () => {
                if (isRevealed || currentDrinkIndex < 0) return;
                const drink = filteredDrinks[currentDrinkIndex];
                if (currentLevel === 1) checkL1(drink);
                else if (currentLevel === 2) checkL2(drink);
                else if (currentLevel === 3) checkL3(drink);
                else if (currentLevel === 4) checkL4(drink);
            });

            btnSkip.addEventListener('click', () => {
                if (isRevealed || currentDrinkIndex < 0) return;
                const drink = filteredDrinks[currentDrinkIndex];
                if (currentLevel === 1) skipL1(drink);
                else if (currentLevel === 2) skipL2(drink);
                else if (currentLevel === 3) skipL3(drink);
                else if (currentLevel === 4) skipL4(drink);
            });

            btnNext.addEventListener('click', loadDrink);

            l3ToggleBtn.addEventListener('click', toggleL3Hints);
            l4ToggleBtn.addEventListener('click', toggleL4Hints);

            $('btnResetProgress').addEventListener('click', () => {
                if (confirm('Reset all progress?')) {
                    saveProgress({});
                    updateProgress();
                    resetQuiz();
                }
            });

            cheatToggle.addEventListener('click', () => {
                cheatSheet.classList.toggle('open');
                cheatToggle.textContent = cheatSheet.classList.contains('open') ? '📋 Hide Menu ▴' :
                    '📋 Show Full Menu ▾';
            });

            $('openSettingsBtn').addEventListener('click', openSettings);
            settingsModal.addEventListener('click', e => {
                if (e.target === settingsModal) settingsModal.classList.remove('open');
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !isRevealed && currentDrinkIndex >= 0 && document.activeElement?.tagName !==
                    'TEXTAREA') {
                    e.preventDefault();
                    btnSubmit.click();
                }
                if ((e.key === 'ArrowRight' || (e.ctrlKey && e.key === 'Enter')) && isRevealed) {
                    e.preventDefault();
                    btnNext.click();
                }
            });

            // ─────────────────────────────────────
            // INIT
            // ─────────────────────────────────────
            function init() {
                updateFilteredDrinks();
                buildCheatSheet();
                updateProgress();
                loadDrink();
                if (currentCategory === 'focus') {
                    const focusPill = catBar.querySelector('.focus-pill');
                    if (focusPill) focusPill.classList.add('active');
                }
                updateCategoryPills();
            }
            init();
        })();
    </script>
</body>
</html>
