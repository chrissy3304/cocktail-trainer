<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cocktail Menu Trainer</title>
    <style>
        /* --- all styles unchanged --- */
        :root {
            --bg: #1a1a24;
            --surface: #242433;
            --surface2: #2e2e40;
            --gold: #d4a96a;
            --gold-light: #e8c97a;
            --text: #e0dcd0;
            --text-dim: #a09b90;
            --accent-green: #5cb88d;
            --accent-red: #d4756b;
            --accent-purple: #b08fd4;
            --border: #3a3a4a;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        input,
        textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }
        .app-header .title-group h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .settings-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            font-family: var(--font);
        }
        .settings-btn:active {
            border-color: var(--gold);
            color: var(--gold-light);
            background: var(--surface2);
        }

        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        .cat-pill {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            font-family: var(--font);
            transition: all var(--transition);
        }
        .cat-pill:active {
            border-color: var(--gold);
            color: var(--text);
        }
        .cat-pill.active {
            background: var(--gold);
            color: #1a1a24;
            border-color: var(--gold);
            font-weight: 600;
        }
        .cat-pill.focus-pill {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }
        .cat-pill.focus-pill.active {
            background: var(--accent-purple);
            color: #fff;
            border-color: var(--accent-purple);
            font-weight: 600;
        }

        .diff-bar {
            display: flex;
            gap: 3px;
            background: var(--surface);
            border-radius: 24px;
            padding: 3px;
            width: fit-content;
            margin: 0 auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        .diff-tab {
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            font-family: var(--font);
        }
        .diff-tab:active {
            color: var(--text);
        }
        .diff-tab.active {
            background: var(--surface2);
            color: var(--gold-light);
            font-weight: 600;
        }

        .quiz-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 260px;
            border: 1px solid var(--border);
            position: relative;
        }
        .quiz-card .drink-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold-light);
            text-align: center;
        }
        .quiz-card .ingredient-count {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: -8px;
        }
        .quiz-card .hint-text {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-dim);
            font-style: italic;
        }

        .ingredient-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-height: 250px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px;
        }
        .ingredient-grid.all-ingredients {
            max-height: 350px;
        }
        .ing-chit {
            padding: 8px 12px;
            border-radius: 18px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: var(--font);
        }
        .ing-chit:active {
            border-color: var(--gold);
            background: #35354a;
        }
        .ing-chit.selected {
            background: var(--gold);
            color: #1a1a24;
            border-color: var(--gold);
            font-weight: 600;
        }
        .ing-chit.correct-reveal {
            background: var(--accent-green) !important;
            color: #fff !important;
            border-color: var(--accent-green) !important;
        }
        .ing-chit.incorrect-reveal {
            background: var(--accent-red) !important;
            color: #fff !important;
            border-color: var(--accent-red) !important;
        }
        .ing-chit.missed-reveal {
            border-color: var(--accent-green) !important;
            border-style: dashed !important;
        }

        .role-slots {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .role-slot label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .role-slot input {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            width: 100%;
            -webkit-appearance: none;
        }
        .role-slot input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .role-slot input.correct {
            border-color: var(--accent-green) !important;
            background: #2a3a30;
        }
        .role-slot input.partial {
            border-color: #d4a040 !important;
            background: #3a3528;
        }
        .role-slot input.incorrect {
            border-color: var(--accent-red) !important;
            background: #3a2828;
        }
        .role-feedback {
            font-size: 0.7rem;
            min-height: 16px;
            padding-left: 4px;
        }
        .role-feedback .missed {
            color: var(--accent-red);
        }
        .role-feedback .extra {
            color: #d4a040;
        }

        .blank-input {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            resize: vertical;
            -webkit-appearance: none;
        }
        .blank-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 22px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: var(--font);
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: var(--gold);
            color: #1a1a24;
        }
        .btn-primary:active {
            background: var(--gold-light);
            transform: scale(0.97);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-secondary:active {
            border-color: var(--gold);
            color: var(--gold-light);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: 16px;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .result-banner {
            text-align: center;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .result-banner.perfect {
            background: #2a3a30;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        .result-banner.good {
            background: #3a3528;
            color: #d4a040;
            border: 1px solid #d4a040;
        }
        .result-banner.poor {
            background: #3a2828;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .progress-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px 16px;
            border: 1px solid var(--border);
        }
        .progress-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-align: center;
        }
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .progress-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            font-size: 0.7rem;
        }
        .progress-item .p-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .progress-bar-mini {
            width: 35px;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .progress-bar-mini .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .fill.high {
            background: var(--accent-green);
        }
        .fill.mid {
            background: #d4a040;
        }
        .fill.low {
            background: var(--accent-red);
        }
        .progress-item .pct {
            font-size: 0.65rem;
            color: var(--text-dim);
            width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .cheat-toggle {
            text-align: center;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 8px;
        }
        .cheat-toggle:active {
            color: var(--gold-light);
        }
        .cheat-sheet {
            display: none;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
            max-height: 400px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .cheat-sheet.open {
            display: block;
        }
        .cheat-sheet h3 {
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
        }
        .cheat-drink {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .cheat-drink:last-child {
            border-bottom: none;
        }
        .cheat-drink .cd-name {
            font-weight: 700;
            color: var(--gold-light);
            font-size: 0.85rem;
        }
        .cheat-drink .cd-ingredients {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            max-width: 700px;
            width: 100%;
            margin: 16px auto;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-content h2 {
            color: var(--gold);
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .settings-drink {
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .settings-drink h4 {
            color: var(--gold-light);
            margin-bottom: 6px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .settings-ingredient {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }
        .settings-ingredient label {
            flex: 1;
            color: var(--text);
            font-size: 0.78rem;
            min-width: 80px;
        }
        .settings-ingredient input {
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.78rem;
            font-family: var(--font);
            width: 80px;
            -webkit-appearance: none;
        }
        .settings-ingredient input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .settings-ingredient .role-badge {
            font-size: 0.65rem;
            background: var(--surface);
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .settings-ingredient .del-ing-btn {
            background: transparent;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            font-weight: 700;
            opacity: 0.6;
        }
        .settings-ingredient .del-ing-btn:active {
            opacity: 1;
        }
        .focus-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-purple);
            cursor: pointer;
        }
        .save-settings-btn {
            display: block;
            margin: 14px auto 0;
            background: var(--gold);
            color: #1a1a24;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .save-settings-btn:active {
            background: var(--gold-light);
            transform: scale(0.97);
        }

        .add-ing-form {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
            background: var(--surface2);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            border: 1px dashed var(--border);
        }
        .add-ing-form input,
        .add-ing-form select {
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.78rem;
            font-family: var(--font);
            -webkit-appearance: none;
            min-width: 60px;
        }
        .add-ing-form input:focus,
        .add-ing-form select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .add-ing-form .add-ing-btn {
            background: var(--gold);
            color: #1a1a24;
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .add-ing-form .add-ing-btn:active {
            transform: scale(0.95);
        }

        .new-cocktail-section {
            margin-top: 16px;
            border-top: 2px solid var(--gold);
            padding-top: 14px;
        }
        .new-cocktail-section h3 {
            color: var(--gold);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        .new-cocktail-section .field-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .new-cocktail-section .field-row input,
        .new-cocktail-section .field-row select {
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.8rem;
            font-family: var(--font);
            flex: 1;
            min-width: 100px;
            -webkit-appearance: none;
        }
        .new-cocktail-section .field-row input:focus,
        .new-cocktail-section .field-row select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .new-ing-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            margin-bottom: 4px;
            background: var(--surface2);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }
        .new-ing-row input,
        .new-ing-row select {
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.75rem;
            font-family: var(--font);
            flex: 1;
            min-width: 60px;
            -webkit-appearance: none;
        }
        .new-ing-row input:focus,
        .new-ing-row select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .new-ing-row .del-new-ing {
            background: transparent;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            font-weight: 700;
            opacity: 0.6;
        }
        .new-ing-row .del-new-ing:active {
            opacity: 1;
        }
        .new-cocktail-section .add-row-btn {
            background: var(--surface2);
            border: 1px dashed var(--border);
            color: var(--text-dim);
            padding: 4px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font);
        }
        .new-cocktail-section .add-row-btn:active {
            border-color: var(--gold);
            color: var(--gold-light);
        }
        .new-cocktail-section .save-cocktail-btn {
            background: var(--accent-green);
            color: #1a1a24;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 6px;
        }
        .new-cocktail-section .save-cocktail-btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .hint-toggle {
            text-align: center;
            margin-top: -4px;
        }
        .hint-toggle button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 4px 14px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: var(--font);
            font-weight: 500;
        }
        .hint-toggle button:active {
            border-color: var(--gold);
            color: var(--gold-light);
        }

        /* new styles for glassware/garnish rows */
        .select-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 4px 0;
        }
        .select-row .label {
            width: 100%;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .select-row .chit {
            padding: 6px 14px;
            border-radius: 18px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: var(--font);
        }
        .select-row .chit:active {
            border-color: var(--gold);
            background: #35354a;
        }
        .select-row .chit.selected {
            background: var(--gold);
            color: #1a1a24;
            border-color: var(--gold);
            font-weight: 600;
        }
        .select-row .chit.correct-reveal {
            background: var(--accent-green) !important;
            color: #fff !important;
            border-color: var(--accent-green) !important;
        }
        .select-row .chit.incorrect-reveal {
            background: var(--accent-red) !important;
            color: #fff !important;
            border-color: var(--accent-red) !important;
        }
        .select-row .chit.missed-reveal {
            border-color: var(--accent-green) !important;
            border-style: dashed !important;
        }

        .extra-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 6px 0;
        }
        .extra-fields .field {
            flex: 1;
            min-width: 120px;
        }
        .extra-fields .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;

            // ─────────────────────────────────────
            // HELPERS
            // ─────────────────────────────────────
            function generateMatchKeys(name) {
                const s = name.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
                const parts = s.split(/\s+/);
                const keys = new Set();
                keys.add(s);
                for (let i = 0; i < parts.length; i++) {
                    for (let j = i + 1; j <= parts.length; j++) {
                        const phrase = parts.slice(i, j).join(' ');
                        if (phrase.length > 2) keys.add(phrase);
                    }
                }
                parts.forEach(p => { if (p.length > 2) keys.add(p); });
                return [...keys];
            }

            function norm(s) { return (s || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim(); }

            function ingMatch(user, keys) {
                const u = norm(user);
                if (u.length < 2) return false;
                for (const k of keys) {
                    const nk = norm(k);
                    if (u === nk || u.includes(nk) || nk.includes(u)) return true;
                }
                return false;
            }

            function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math
                        .random() * (i + 1));
                    [b[i], b[j]] = [b[j], b[i]]; } return b; }

            function escapeHTML(s) { const d = document.createElement('div');
                d.textContent = s; return d.innerHTML; }

            // ── garnish helpers ──
            function splitGarnish(s) {
                if (!s) return [];
                const parts = s.split(/\s*,\s*|\s+and\s+/i).map(p => p.trim()).filter(p => p.length > 0);
                return parts;
            }

            function garnishSet(s) {
                const items = splitGarnish(s);
                return new Set(items.map(norm));
            }

            // BUILD COCKTAIL LIST (base + mods + custom)
            // ─────────────────────────────────────
            let focusSet = loadFocusSet();

            function buildCocktails() {
                const measMap = loadMeasurements();
                const mods = loadMods();
                const custom = loadCustomCocktails();

                const result = baseCocktails.map(c => {
                    const mod = mods[c.name] || {};
                    const deleted = new Set(mod.deleted || []);
                    let ingredients = c.ingredients.filter(i => !deleted.has(i.full));
                    const added = (mod.added || []).map(a => ({
                        ...a,
                        matchKeys: a.matchKeys || generateMatchKeys(a.full),
                        measurement: measMap[c.name + '||' + a.full] || a.measurement || ''
                    }));
                    ingredients = [...ingredients, ...added];
                    ingredients = ingredients.map(i => ({
                        ...i,
                        measurement: measMap[c.name + '||' + i.full] || i.measurement || ''
                    }));
                    return {
                        ...c,
                        ingredients,
                        focus: focusSet.has(c.name),
                        _custom: false,
                    };
                });

                custom.forEach(c => {
                    const ingredients = c.ingredients.map(i => ({
                        ...i,
                        matchKeys: i.matchKeys || generateMatchKeys(i.full),
                        measurement: measMap[c.name + '||' + i.full] || i.measurement || ''
                    }));
                    result.push({
                        name: c.name,
                        category: c.category || 'Uncategorized',
                        glassware: c.glassware || '',
                        garnish: c.garnish || '',
                        ingredients,
                        focus: focusSet.has(c.name),
                        _custom: true
                    });
                });

                return result;

                const p = loadProgress();
                return p[key] || { correct: 0, attempts: 0 };

            function recordAttempt(drinkName, level, correct) {
                const key = drinkName + '||' + level;
                const p = loadProgress();
                const cur = p[key] || { correct: 0, attempts: 0 };
                cur.attempts++;
                if (correct) cur.correct++;
                p[key] = cur;
                saveProgress(p);
            }

            function getPct(drinkName, level) {
                const p = getProgress(drinkName, level);
                if (p.attempts === 0) return null;
                return Math.round((p.correct / p.attempts) * 100);
            }

                if (currentCategory === 'focus') {
                    filteredDrinks = cocktails.filter(c => c.focus);
                } else if (currentCategory === 'all') {
                    filteredDrinks = [...cocktails];
                } else {
                    filteredDrinks = cocktails.filter(c => c.category === currentCategory);
                }
                updateCategoryPills();

            function updateCategoryPills() {
                const pills = document.querySelectorAll('.cat-pill');
                const counts = {};
                cocktails.forEach(c => { counts[c.category] = (counts[c.category] || 0) + 1; });
                counts['all'] = cocktails.length;
                counts['focus'] = cocktails.filter(c => c.focus).length;
                pills.forEach(pill => {
                    const cat = pill.dataset.cat;
                    const count = counts[cat] !== undefined ? counts[cat] : 0;
                    if (cat === 'focus') {
                        pill.textContent = `🎯 Focus (${count})`;
                    } else if (cat === 'all') {
                        pill.textContent = `All (${count})`;

            function getAllGlassware() {
                const set = new Set();
                cocktails.forEach(c => { if (c.glassware) set.add(c.glassware); });
                set.add('Slims');
                set.add('Stackers');
                return [...set].sort();

                const set = new Set();
                cocktails.forEach(c => {
                    if (c.garnish) {
                        const items = splitGarnish(c.garnish);

                hintText.textContent = '';

            // ── Shared function to build a select row ──
            function buildSelectRow(options, selectedValues, label) {
                let html = `<div class="select-row"><div class="label">${label}</div>`;
                options.forEach(opt => {
                    const sel = selectedValues.has(opt) ? 'selected' : '';
                    html += `<span class="chit ${sel}" data-value="${escapeHTML(opt)}">${escapeHTML(opt)}</span>`;
                });
                html += '</div>';
                return html;
